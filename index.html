<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <title>回聲 — 歌詞本落版示意</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #0e0e0e;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-family: 'Helvetica Neue', 'PingFang TC', Arial, sans-serif;
      padding: 48px 24px;
      user-select: none;
    }

    header {
      color: #444;
      font-size: 10px;
      letter-spacing: 5px;
      text-transform: uppercase;
      margin-bottom: 36px;
    }

    .viewer-row {
      display: flex;
      align-items: center;
      gap: 32px;
    }

    .nav-btn {
      background: none;
      border: 1px solid #2a2a2a;
      color: #444;
      width: 42px;
      height: 42px;
      border-radius: 50%;
      cursor: pointer;
      transition: border-color 0.2s, color 0.2s;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .nav-btn:hover:not(:disabled) { border-color: #555; color: #aaa; }
    .nav-btn:disabled { opacity: 0.12; cursor: not-allowed; }

    /* Book shadow container */
    .book-shadow {
      box-shadow:
        0 30px 90px rgba(0,0,0,0.95),
        0 0 0 1px rgba(255,255,255,0.03);
    }

    /* Spread container — always 700×350 */
    .spread {
      width: 700px;
      height: 350px;
      display: flex;
      position: relative;
      overflow: hidden;
    }

    /* Spine */
    .spine {
      position: absolute;
      left: 50%;
      top: 0;
      bottom: 0;
      width: 2px;
      transform: translateX(-50%);
      background: linear-gradient(to right, #bbb 0%, #777 40%, #999 60%, #bbb 100%);
      z-index: 30;
      box-shadow: -4px 0 12px rgba(0,0,0,0.6), 4px 0 12px rgba(0,0,0,0.6);
    }

    /* Half page */
    .half {
      width: 350px;
      height: 350px;
      flex-shrink: 0;
      position: relative;
      overflow: hidden;
    }

    /* Lyric page */
    .lyric-page {
      background: #f3ece0;
      display: flex;
      flex-direction: column;
      padding: 44px 38px 28px;
    }

    .seq {
      font-size: 9px;
      color: #b5a898;
      letter-spacing: 3px;
      margin-bottom: 10px;
    }

    .song-name {
      font-size: 16px;
      color: #1c1c1c;
      font-weight: 400;
      line-height: 1.5;
      letter-spacing: 0.5px;
    }

    .lines-area {
      flex: 1;
      margin-top: 30px;
      display: flex;
      flex-direction: column;
      gap: 15px;
    }

    .ln { height: 1px; background: rgba(0,0,0,0.07); }
    .ln.s { width: 52%; }
    .ln.m { width: 74%; }
    .ln.l { width: 100%; }

    .pn-bottom {
      font-size: 8px;
      color: #c0b4a4;
      letter-spacing: 2px;
      margin-top: 20px;
    }

    /* Photo page */
    .photo-page {
      background: #191919;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .photo-page img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .photo-placeholder {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
    }

    .photo-placeholder svg { opacity: 0.25; }
    .photo-placeholder span {
      font-size: 9px;
      color: #555;
      letter-spacing: 3px;
    }

    .pn-photo-r {
      position: absolute;
      bottom: 14px;
      right: 15px;
      font-size: 8px;
      color: rgba(255,255,255,0.18);
      letter-spacing: 2px;
    }

    .pn-photo-l {
      position: absolute;
      bottom: 14px;
      left: 15px;
      font-size: 8px;
      color: rgba(255,255,255,0.18);
      letter-spacing: 2px;
    }

    /* Full spread */
    .full-spread-content {
      width: 700px;
      height: 350px;
      position: relative;
      overflow: hidden;
      background: #111;
      flex-shrink: 0;
    }

    .full-spread-content img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .full-spread-fallback {
      position: absolute;
      inset: 0;
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 14px;
    }

    .full-spread-fallback svg { opacity: 0.2; }
    .full-spread-fallback span {
      font-size: 10px;
      color: #444;
      letter-spacing: 4px;
    }

    .full-spread-pn {
      position: absolute;
      bottom: 14px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 8px;
      color: rgba(255,255,255,0.12);
      letter-spacing: 3px;
    }

    /* Cover */
    .cover-l { background: #080808; display: flex; align-items: flex-end; padding: 32px; }
    .cover-l-note { font-size: 8px; color: #2a2a2a; letter-spacing: 4px; }
    .cover-r {
      background: #080808;
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      justify-content: flex-end;
      padding: 36px;
    }
    .cover-title { font-size: 34px; color: #ccc; letter-spacing: 12px; font-weight: 300; }
    .cover-sub { font-size: 9px; color: #444; letter-spacing: 5px; margin-top: 10px; }
    .cover-mock { font-size: 8px; color: #2a2a2a; letter-spacing: 3px; margin-top: 24px; }

    /* Blank */
    .blank-p { background: #f3ece0; display: flex; align-items: center; justify-content: center; }
    .blank-p span { font-size: 8px; color: #ccc; letter-spacing: 3px; }

    /* Back cover */
    .back-p { background: #080808; }

    /* Info bar */
    .info-bar {
      margin-top: 28px;
      color: #3a3a3a;
      font-size: 11px;
      letter-spacing: 2px;
      min-height: 18px;
    }

    /* Dot nav */
    .dot-row {
      display: flex;
      gap: 7px;
      margin-top: 18px;
      flex-wrap: wrap;
      justify-content: center;
      max-width: 780px;
    }

    .dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: #252525;
      cursor: pointer;
      transition: background 0.15s;
      flex-shrink: 0;
    }
    .dot:hover { background: #484848; }
    .dot.active { background: #777; }
    .dot.wide { width: 14px; border-radius: 3px; }

    .key-hint {
      margin-top: 14px;
      font-size: 9px;
      color: #1e1e1e;
      letter-spacing: 3px;
    }
  </style>
</head>
<body>

<header>回聲樂團 — 2026 歌詞本落版示意</header>

<div class="viewer-row">
  <button class="nav-btn" id="prevBtn" onclick="go(-1)">
    <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
      <path d="M9 2.5L4.5 7L9 11.5" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/>
    </svg>
  </button>

  <div class="book-shadow">
    <div class="spread" id="spread"></div>
  </div>

  <button class="nav-btn" id="nextBtn" onclick="go(1)">
    <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
      <path d="M5 2.5L9.5 7L5 11.5" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/>
    </svg>
  </button>
</div>

<div class="info-bar" id="infoBar"></div>
<div class="dot-row" id="dotRow"></div>
<div class="key-hint">← →</div>

<script>
function src(name) {
  return 'photos/' + encodeURIComponent(name) + '.jpg';
}

// Line patterns (s=short, m=medium, l=long)
const LP = [
  ['l','m','s','l','m','l','s','m','l','s','m','l'],
  ['m','l','s','m','l','s','l','m','s','l','m','s'],
];

function lines(i) {
  return LP[i % 2].map(c => `<div class="ln ${c}"></div>`).join('');
}

const PHOTO_ICON = `<svg width="34" height="34" viewBox="0 0 34 34" fill="none">
  <rect x="2" y="2" width="30" height="30" rx="3" stroke="#555" stroke-width="1.4"/>
  <circle cx="12" cy="13" r="3.5" stroke="#555" stroke-width="1.4"/>
  <path d="M2 26l8-8 5.5 5.5 4.5-4.5 12 12" stroke="#555" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/>
</svg>`;

function photoBlock(name, pnClass, pnVal) {
  if (name) {
    return `<img src="${src(name)}" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">
    <div class="photo-placeholder" style="display:none;position:absolute;inset:0;background:#191919;align-items:center;justify-content:center;flex-direction:column;gap:12px">
      ${PHOTO_ICON}<span>PHOTO</span>
    </div>
    <span class="${pnClass}">${pnVal}</span>`;
  }
  return `<div class="photo-placeholder">${PHOTO_ICON}<span>PHOTO</span></div>
  <span class="${pnClass}">${pnVal}</span>`;
}

const spreads = [
  { type: 'cover' },
  { type: 'lp', song: '撲向那隻狼',                         pL: 1,  pR: 2  },
  { type: 'lp', song: '我學會的物理',                        pL: 3,  pR: 4  },
  { type: 'lp', song: 'Because I Love You So',              pL: 5,  pR: 6  },
  { type: 'lp', song: '誰的心忘了',                          pL: 7,  pR: 8  },
  { type: 'lp', song: '末日的我們在一起',                    pL: 9,  pR: 10 },
  { type: 'lp', song: "Be Careful What You're Wishing For", pL: 11, pR: 12 },
  { type: 'lp', song: 'Amazon',                             pL: 13, pR: 14 },
  { type: 'lp', song: '訂閱冥想',             photo: '訂閱冥想',                  pL: 15, pR: 16 },
  { type: 'lp', song: 'Take A Shine',     photo: 'Take A Shine',               pL: 17, pR: 18 },
  { type: 'lp', song: 'Silent Night in Shinjuku', photo: 'Silent Night in Shinjuku', pL: 19, pR: 20 },
  { type: 'full',                          photo: '中間大跨頁',                 pL: 21, pR: 22 },
  { type: 'pl', song: '瞬間',     pL: 23, pR: 24 },
  { type: 'pl', song: 'OK?',      pL: 25, pR: 26 },
  { type: 'pl', song: '解放',     pL: 27, pR: 28 },
  { type: 'pl', song: '繞',       pL: 29, pR: 30 },
  { type: 'pl', song: '感官駕馭', pL: 31, pR: 32 },
  { type: 'pl', song: '天馬神風', pL: 33, pR: 34 },
  { type: 'blank',                 pL: 35, pR: 36 },
  { type: 'blank',                 pL: 37, pR: 38 },
  { type: 'blank',                 pL: 39, pR: 40 },
  { type: 'blank',                 pL: 41, pR: 42 },
  { type: 'back' }
];

function render(i) {
  const s = spreads[i];
  const el = document.getElementById('spread');

  if (s.type === 'cover') {
    el.innerHTML = `
      <div class="spine"></div>
      <div class="half cover-l"><span class="cover-l-note">MOCKUP</span></div>
      <div class="half cover-r">
        <div class="cover-title">回聲</div>
        <div class="cover-sub">2026 歌詞本</div>
        <div class="cover-mock">落版示意</div>
      </div>`;
  }
  else if (s.type === 'lp') {
    el.innerHTML = `
      <div class="spine"></div>
      <div class="half lyric-page">
        <div class="seq">— ${String(s.pL).padStart(2,'0')}</div>
        <div class="song-name">${s.song}</div>
        <div class="lines-area">${lines(i)}</div>
        <div class="pn-bottom">${s.pL}</div>
      </div>
      <div class="half photo-page">
        ${photoBlock(s.photo || null, 'pn-photo-r', s.pR)}
      </div>`;
  }
  else if (s.type === 'full') {
    el.innerHTML = `
      <div class="full-spread-content">
        <img src="${src(s.photo)}"
          onerror="this.style.display='none';document.getElementById('fsfb').style.display='flex'">
        <div class="full-spread-fallback" id="fsfb">
          <svg width="44" height="44" viewBox="0 0 44 44" fill="none">
            <rect x="2" y="2" width="40" height="40" rx="4" stroke="#555" stroke-width="1.4"/>
            <circle cx="15" cy="17" r="5" stroke="#555" stroke-width="1.4"/>
            <path d="M2 36l11-11 7 7 6-6 16 16" stroke="#555" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
          <span>中間大跨頁</span>
          <span style="font-size:9px;color:#333;letter-spacing:2px">全版照片</span>
        </div>
        <div class="full-spread-pn">pp. ${s.pL} — ${s.pR}</div>
      </div>`;
  }
  else if (s.type === 'pl') {
    el.innerHTML = `
      <div class="spine"></div>
      <div class="half photo-page">
        ${photoBlock(s.photo || null, 'pn-photo-l', s.pL)}
      </div>
      <div class="half lyric-page">
        <div class="seq">— ${String(s.pR).padStart(2,'0')}</div>
        <div class="song-name">${s.song}</div>
        <div class="lines-area">${lines(i)}</div>
        <div class="pn-bottom">${s.pR}</div>
      </div>`;
  }
  else if (s.type === 'blank') {
    el.innerHTML = `
      <div class="spine"></div>
      <div class="half blank-p"><span>${s.note || ''}</span></div>
      <div class="half blank-p"><span style="color:#ddd;letter-spacing:2px">${s.pR}</span></div>`;
  }
  else if (s.type === 'back') {
    el.innerHTML = `
      <div class="spine"></div>
      <div class="half back-p"></div>
      <div class="half back-p"></div>`;
  }

  // Info label
  let label = '';
  if      (s.type === 'cover') label = '封面';
  else if (s.type === 'back')  label = '封底';
  else if (s.type === 'full')  label = `pp. ${s.pL}–${s.pR}　中間大跨頁`;
  else if (s.type === 'blank') label = `pp. ${s.pL}–${s.pR}　${s.note || '空白'}`;
  else                         label = `pp. ${s.pL}–${s.pR}　${s.song}`;
  document.getElementById('infoBar').textContent = label;

  document.getElementById('prevBtn').disabled = i === 0;
  document.getElementById('nextBtn').disabled = i === spreads.length - 1;
  document.querySelectorAll('.dot').forEach((d, idx) => d.classList.toggle('active', idx === i));
}

let cur = 0;

function go(dir) {
  cur = Math.max(0, Math.min(spreads.length - 1, cur + dir));
  render(cur);
}

// Build dot nav
const dotRow = document.getElementById('dotRow');
spreads.forEach((s, i) => {
  const d = document.createElement('div');
  d.className = 'dot' + (s.type === 'full' ? ' wide' : '');
  d.title = s.song || s.type;
  d.onclick = () => { cur = i; render(i); };
  dotRow.appendChild(d);
});

document.addEventListener('keydown', e => {
  if (e.key === 'ArrowLeft')  go(-1);
  if (e.key === 'ArrowRight') go(1);
});

render(0);
</script>
</body>
</html>
